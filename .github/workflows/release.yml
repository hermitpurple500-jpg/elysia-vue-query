name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Typecheck & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prepare Nuxt module
        run: cd packages/nuxt && bun run nuxt-module-build prepare

      - name: Build packages
        run: bun run build

      - name: Typecheck
        run: bun run typecheck

      - name: Run tests
        run: bun run test

  release:
    name: Version or Publish
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: release
    permissions:
      contents: write
      pull-requests: write
      # Required for npm provenance — links published packages to this workflow run
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Full history is required for changesets to compute correct changelogs
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Node.js is required for npm publish (bun publish uses npm registry auth)
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prepare Nuxt module
        run: cd packages/nuxt && bun run nuxt-module-build prepare

      - name: Build packages
        run: bun run build

      - name: Create Version PR or Publish
        uses: changesets/action@v1
        with:
          # When pending changesets exist → opens / updates a "Version Packages" PR
          # When the version PR is merged  → runs this publish command
          publish: bun run changeset:publish
          title: "chore: version packages"
          commit: "chore: version packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
