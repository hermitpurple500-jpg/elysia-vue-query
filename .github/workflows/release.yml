name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "LICENSE"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Check, Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - name: Prepare Nuxt module
        run: vp exec nuxt-module-build prepare --filter @elysia-vue-query/nuxt

      - name: Build packages
        run: vp run build

      - name: Check (lint, format, typecheck)
        run: vp run check

      - name: Run tests
        run: vp test run

  release:
    name: Version or Publish
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: release
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - name: Setup npm registry
        uses: actions/setup-node@v6
        with:
          registry-url: https://registry.npmjs.org

      - name: Prepare Nuxt module
        run: vp exec nuxt-module-build prepare --filter @elysia-vue-query/nuxt

      - name: Build packages
        run: vp run build

      - name: Create Version PR or Publish
        uses: changesets/action@v1
        with:
          publish: vp run changeset:publish
          title: "chore: version packages"
          commit: "chore: version packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
